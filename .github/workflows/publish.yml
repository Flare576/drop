# Publishes the `drop-f` CLI to npm via OIDC trusted publishing (no stored npm token).
#
# One-time manual step before this workflow can ever succeed: npm requires a brand-new
# package's FIRST version to be published by hand (`npm login` + `npm publish --access
# public` from a local machine) -- trusted publishing can only be configured for a
# package that already exists on the registry. After that one manual publish, go to
# https://www.npmjs.com/package/drop-f/access -> Trusted Publisher -> GitHub Actions,
# and register this exact repo + workflow filename (publish.yml) before tagging a
# second release through CI.

name: Publish to npm

on:
  push:
    branches: ['main']
    tags: ['v*']
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Pinned + checksummed so a compromised upstream script can't run arbitrary code
      # with this job's Docker/host access. Drives the same api+db Docker Compose
      # stack tests/bun/api's relay suite depends on (its docker-stack.ts helper
      # shells out to `vroom`), exactly like local dev -- see README.md's "Local
      # development" section and docs/adr/0009-docker-for-local-php.md.
      - name: Install vroom
        run: |
          curl -fsSL https://raw.githubusercontent.com/Flare576/vroom/v12.3.1/bin/vroom -o /tmp/vroom
          echo "25bf3f895c2eba09c3f596f70ebdf30b9fcc1ff6b55e9105cf2c0b46d0bd20e5  /tmp/vroom" | shasum -a 256 -c -
          sudo install -m 0755 /tmp/vroom /usr/local/bin/vroom

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full test harness
        # Keep the publish gate aligned with the repo's actual local contract instead of
        # only typechecking plus a no-op smoke path.
        run: npm run test:all

      - name: Smoke test push.ts still runs (no working-tree changes -> exit 0)
        # Fake creds only reach requireCredentials(); a clean checkout has no working-
        # tree changes, so captureDiff() returns empty and push.ts exits 0 before ever
        # touching the network -- this never makes a real request to the live relay.
        run: bun run cli/push.ts
        env:
          DROP_USERNAME: ci-smoke-test
          DROP_PASSPHRASE: ci-smoke-test-not-a-real-secret
          DROP_AUTH: ci-smoke-test

  publish:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: test
    runs-on: ubuntu-latest
    environment: NPM
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'

      - run: npm ci

      # No build step: push.ts and shared/crypto.ts ship as raw TypeScript, executed
      # directly by Bun at install time (via the "bin" field in package.json) -- there
      # is no compiled dist/ output to produce, unlike ei's tsc-to-dist pipeline.
      - run: npm publish --access public
