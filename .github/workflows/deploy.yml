# Encrypted dead-drop relay — deploys to flare576.com (IONOS shared hosting,
# rssh-restricted SFTP-only access, no shell/mkdir over SSH), the same host
# that serves the sibling `ei` and `mylibrary` apps.
#
# This app has its OWN isolated SFTP account and its OWN MySQL database,
# provisioned separately from ei/mylibrary — no credentials are shared across apps.
# Secrets used by this workflow:
#   Repo secrets:      SFTP_HOST, SFTP_USERNAME, SFTP_PASSWORD
#   "Prod" env secrets: DB_HOST, DB_USERNAME, DB_PASSWORD, DB_DATABASE, DATA_PATH,
#     DB_SOCKET (optional -- unix socket path, not currently used on this TCP-only host)
# (DB_DATABASE / DATA_PATH still need to be added to the Prod environment — see
# api/config.php.template for what each configures. There is no PUSH_TOKEN secret
# any more -- the POST team-gate now lives in the allowed_auth DB table, populated
# manually, not via CI/config. config.php is generated via scripts/render-config.php,
# NOT sed -- sed broke on secrets containing "/" or "&" and could emit invalid PHP
# for a secret containing "'"; see that script's header for the escaping rationale.)

name: Deploy to flare576.com

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run full test harness
        # Ship the same bar that is green locally: typecheck + Bun suite + Playwright
        # browser suite. Beta's post-round2 review found the old gate was narrower than
        # the repo's actual trust-boundary coverage.
        run: npm run test:all

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # api/ has no framework/Composer, so there's no PHPUnit suite -- but a bare
      # `php -l` per file is exactly the gate that would have caught api/drop.php's
      # syntax error (Beta QA finding C1) before it ever shipped.
      - name: Lint PHP
        run: |
          for f in $(find api -name '*.php'); do
            php -l "$f"
          done

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: Prod

    steps:
      - uses: actions/checkout@v4

      # No bundler/dist step here (unlike ei's Vite build) — web/ is plain
      # static files deployed as-is, and api/ is plain PHP.

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'

      # Renders api/config.php.template with real secrets. NOT `sed` -- a prior sed-based
      # version broke on any secret containing `/` (DATA_PATH always does) or `&`, and could
      # emit invalid PHP for a secret containing `'` (Beta QA finding C2). See
      # scripts/render-config.php for the escaping rationale.
      - name: Generate API config
        env:
          DB_HOSTNAME: ${{ secrets.DB_HOST }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DATA_PATH: ${{ secrets.DATA_PATH }}
          # Optional -- not currently set as a real secret on this host (flare576.com's
          # MySQL is TCP, not unix-socket), left wired here so the branch is reachable the
          # moment a deployment target needs it. Empty/unset renders identically: render-
          # config.php drops the DB_SOCKET define entirely (Beta QA finding M3).
          DB_SOCKET: ${{ secrets.DB_SOCKET }}
        run: |
          php scripts/render-config.php api/config.php.template api/config.php
          php -l api/config.php

      - name: Deploy API
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./api/
          remote_path: /
          sftpArgs: '-o ConnectTimeout=5'
          sftp_only: true

      - name: Deploy api/.htaccess (dotfile, excluded from glob)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./api/.htaccess
          remote_path: /api
          sftpArgs: '-o ConnectTimeout=5'
          sftp_only: true

      # web/ is plain static files (index.html, app.js, crypto.js, style.css)
      # — confirmed with the web-UI track: crypto.js is a hand-copied,
      # type-annotation-stripped port of shared/crypto.ts, so web/ is fully
      # self-contained and shared/ is never deployed alongside it. No
      # web/.htaccess step either — it's static assets only, no client-side
      # routing/rewrite rules to protect (unlike api/'s router dispatch).
      - name: Deploy web
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: ./web/*
          remote_path: /
          sftpArgs: '-o ConnectTimeout=5'
          sftp_only: true
